name: Generate video

on:
  workflow_dispatch:
  push:
    paths:
      - "generate_video.py"
      - "example.config.json"
      - "requirements.txt"
      - ".github/workflows/generate-video.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render MP4
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p output
          python generate_video.py --config example.config.json --output output/osv-pitch.mp4

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/osv-pitch.mp4
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: render-${{ github.run_id }}
          name: Latest Render
          files: output/osv-pitch.mp4
